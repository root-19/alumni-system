[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[services.variables]
PHP_VERSION = "8.2"
NODE_VERSION = "18"

# Enable required PHP extensions for MySQL
PHP_EXTENSIONS = "pdo,pdo_mysql,mysqli,gd,zip,bcmath,ctype,fileinfo,json,mbstring,openssl,tokenizer,xml"

# Laravel environment
APP_ENV = "production"
APP_DEBUG = "false"
APP_KEY = "base64:your-app-key-here"

# Database connection
DB_CONNECTION = "mysql"
DB_TIMEOUT = "60"

# Cache & Session
CACHE_DRIVER = "file"
SESSION_DRIVER = "file"
QUEUE_CONNECTION = "sync"

# Filesystem
FILESYSTEM_DISK = "local"

# SimpleCert API (replace with actual values)
SIMPLECERT_EMAIL = "your-email@example.com"
SIMPLECERT_PASSWORD = "your-password"
SIMPLECERT_API_KEY = "your-api-key"
